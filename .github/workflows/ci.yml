name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + test ────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio anyio httpx

      - name: Install Playwright (for from-url tests)
        run: playwright install chromium

      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short
        env:
          PYTHONPATH: backend

  # ── Backend: security lint ──────────────────────────────────────────────────
  backend-security:
    name: Backend Security Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r backend/ -ll --exclude backend/__pycache__

  # ── DB Migration Test (s4-d2) ───────────────────────────────────────────────
  db-migration-test:
    name: DB Migration Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run DB migration test
        run: |
          python3 - <<'EOF'
          import asyncio, os, tempfile, sys
          sys.path.insert(0, "backend")

          # Geçici DB dosyası kullan
          with tempfile.NamedTemporaryFile(suffix=".db", delete=False) as f:
              tmp_db = f.name

          os.environ["DB_PATH"] = tmp_db

          import db  # backend/db.py

          async def run():
              await db.init_db()
              print("✓ init_db() başarılı")

              # credits tablosuna yaz
              test_user_id = "ci-test-user"
              balance_before = await db.get_balance(test_user_id)
              assert balance_before == db.INITIAL_BALANCE, \
                  f"Beklenen {db.INITIAL_BALANCE}, alınan {balance_before}"
              print(f"✓ get_balance() → {balance_before} (INITIAL_BALANCE)")

              # debit_credits
              ok = await db.debit_credits(test_user_id, 10, model="test-model", endpoint="/test")
              assert ok, "debit_credits() False döndü"
              after_debit = await db.get_balance(test_user_id)
              assert after_debit == db.INITIAL_BALANCE - 10, \
                  f"Beklenen {db.INITIAL_BALANCE - 10}, alınan {after_debit}"
              print(f"✓ debit_credits(10) → bakiye {after_debit}")

              # add_credits
              await db.add_credits(test_user_id, 50, note="ci-topup")
              after_add = await db.get_balance(test_user_id)
              assert after_add == db.INITIAL_BALANCE - 10 + 50, \
                  f"Beklenen {db.INITIAL_BALANCE + 40}, alınan {after_add}"
              print(f"✓ add_credits(50) → bakiye {after_add}")

              # get_ledger
              ledger = await db.get_ledger(test_user_id)
              assert len(ledger) >= 2, f"Ledger kayıtları beklendi ≥2, alınan {len(ledger)}"
              print(f"✓ get_ledger() → {len(ledger)} kayıt")

              # negatif bakiye koruması
              ok_over = await db.debit_credits(test_user_id, 99999, model="x", endpoint="/x")
              assert not ok_over, "Fazla debit engellenmedi!"
              print("✓ negatif bakiye koruması çalışıyor")

              print("\n✅ Tüm DB migration testleri geçti.")

          asyncio.run(run())
          EOF
        env:
          PYTHONPATH: backend

  # ── Langfuse Smoke Test (s4-d2) ─────────────────────────────────────────────
  langfuse-smoke-test:
    name: Langfuse Smoke Test (no-op mode)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Test Langfuse no-op mode (keys absent)
        run: |
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, "backend")

          # Anahtarlar YOK — no-op modda çalışmalı
          import observe

          # _get_client() → None döndürmeli
          client = observe._get_client()
          assert client is None, f"Beklenen None, alınan: {client}"
          print("✓ _get_client() → None (no-op, anahtarlar yok)")

          # GenerationTrace no-op
          with observe.GenerationTrace(model="test-model", endpoint="/test") as trace:
              trace.set_usage(input_tokens=100, output_tokens=50)
          print("✓ GenerationTrace no-op context manager → hata yok")

          # log_event no-op
          observe.log_event("ci-smoke-test", {"env": "ci"})
          print("✓ log_event() no-op → hata yok")

          # flush no-op
          observe.flush()
          print("✓ flush() no-op → hata yok")

          print("\n✅ Langfuse no-op smoke test geçti.")
          EOF
        env:
          PYTHONPATH: backend
          # Anahtarlar kasıtlı olarak AYARLANMADI — no-op davranışını test eder

      - name: Test Langfuse observe module imports cleanly
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'backend')
          import observe
          assert hasattr(observe, 'GenerationTrace'), 'GenerationTrace eksik'
          assert hasattr(observe, 'log_event'), 'log_event eksik'
          assert hasattr(observe, 'flush'), 'flush eksik'
          print('✓ observe modülü düzgün import edildi')
          "
        env:
          PYTHONPATH: backend

  # ── Frontend: type check + build ────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build Next.js
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000

  # ── Smoke test: both services start ─────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Backend API)
    runs-on: ubuntu-latest
    needs: [backend-test, db-migration-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend
        run: uvicorn main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend

      - name: Wait for backend to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8000/health && echo "Backend ready" && exit 0
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "Backend did not start in time" && exit 1

      - name: Health check
        run: curl -sf http://localhost:8000/health | grep healthy

      - name: Models endpoint check
        run: curl -sf http://localhost:8000/api/models | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['models']) >= 8; assert len(d['frameworks']) >= 4; print('OK — models:', len(d['models']), 'frameworks:', len(d['frameworks']))"

      - name: Metrics endpoint check
        run: curl -sf http://localhost:8000/api/metrics | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'requests_total' in d; print('OK — metrics endpoint working')"

      - name: Auth register + login smoke test
        run: |
          REG=$(curl -sf -X POST http://localhost:8000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@smoke.test","password":"CiSmoke123!"}')
          echo "$REG" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'token' in d; print('register OK, token alındı')"

          TOKEN=$(echo "$REG" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          curl -sf http://localhost:8000/api/credits/balance \
            -H "Authorization: Bearer $TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d['balance'] >= 0; print('credits/balance OK:', d['balance'])"

      - name: 401 protection check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/credits/balance)
          [ "$STATUS" = "401" ] && echo "401 protection OK" || (echo "FAIL: expected 401, got $STATUS" && exit 1)
