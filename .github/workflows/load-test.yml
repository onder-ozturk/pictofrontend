name: Load Test

# Sprint 4 — s4-q2
# Manuel tetikleyici — otomatik CI'a dahil edilmez (API key gerektirir).
# Locust headless modda çalışır, hedefler:
#   - P95 < 30s
#   - Hata oranı < %2

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Backend URL (örn. http://staging.example.com:8000)"
        required: true
        default: "http://localhost:8000"
      users:
        description: "Eş zamanlı kullanıcı sayısı"
        required: true
        default: "50"
      run_time:
        description: "Test süresi (örn. 60s, 2m)"
        required: true
        default: "60s"

jobs:
  load-test:
    name: Locust Load Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install locust

      - name: Start backend (if local)
        if: contains(inputs.host, 'localhost')
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health || exit 1
        working-directory: backend

      - name: Create report directory
        run: mkdir -p report

      - name: Run Locust load test
        run: |
          locust -f tests/locustfile.py \
            --headless \
            --users ${{ github.event.inputs.users }} \
            --spawn-rate 10 \
            --run-time ${{ github.event.inputs.run_time }} \
            --host ${{ github.event.inputs.host }} \
            --csv report/load-test \
            --html report/load-test-report.html \
            --exit-code-on-error 0  # doğrulama aşağıda yapılır
        env:
          PYTHONPATH: backend

      - name: Validate results (P95 < 30s, error rate < 2%)
        run: python tests/locustfile.py --validate report/load-test_stats.csv
        env:
          PYTHONPATH: backend

      - name: Upload load test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          path: report/
          retention-days: 30
