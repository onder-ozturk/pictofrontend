# ── PicToFrontend — Nginx Reverse Proxy Configuration ────────────────────────
# Sprint 4 — s4-g2
# Sağlar:
#   - HTTP → HTTPS kalıcı yönlendirme (301)
#   - HTTPS + TLS 1.2/1.3 (Let's Encrypt / Certbot sertifikaları)
#   - HSTS (Strict-Transport-Security)
#   - Backend (FastAPI :8000) ve Frontend (Next.js :3000) proxy
#   - WebSocket (/api/generate/ws) proxy desteği
#   - Güvenlik başlıkları (X-Frame-Options, X-Content-Type-Options, vb.)
#
# Kullanım:
#   1. DOMAIN değişkenini gerçek alan adınızla değiştirin.
#   2. Certbot ile sertifika alın:
#        certbot --nginx -d your-domain.com -d www.your-domain.com
#   3. nginx -t && systemctl reload nginx
#
# Geliştirme / yerel test için bkz. nginx.dev.conf

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # ── Rate limiting (IP başına) ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Upstream tanımları ──────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS yönlendirme ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name YOUR_DOMAIN www.YOUR_DOMAIN;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Her şeyi HTTPS'e yönlendir
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Ana Sunucu ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name YOUR_DOMAIN www.YOUR_DOMAIN;

        # ── TLS Sertifikaları (Certbot tarafından doldurulur) ──────────────────
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # ── TLS ayarları ───────────────────────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Güvenlik başlıkları ────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN"                                  always;
        add_header X-Content-Type-Options    "nosniff"                                     always;
        add_header X-XSS-Protection          "1; mode=block"                               always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"    always;

        # ── İstek boyutu limiti (video yüklemeleri için) ──────────────────────
        client_max_body_size 100M;
        client_body_timeout  120s;
        proxy_read_timeout   120s;

        # ── Backend API proxy ─────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Streaming için buffer'ı kapat
            proxy_buffering       off;
            proxy_cache           off;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;

            # SSE / chunked transfer
            chunked_transfer_encoding on;
        }

        # ── Auth endpoint (daha katı rate limit) ─────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── WebSocket proxy (/api/generate/ws) ───────────────────────────────
        location /api/generate/ws {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       X-Real-IP  $remote_addr;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # ── Health check (monitoring araçları için public) ────────────────────
        location /health {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── Frontend Next.js proxy ────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Next.js HMR için WebSocket
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
