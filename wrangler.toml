name = "pictofrontend-proxy"
main = "cloudflare/worker.mjs"
compatibility_date = "2026-03-01"
workers_dev = false

routes = [
  { pattern = "pictofrontend.com/*", zone_name = "pictofrontend.com" },
  { pattern = "www.pictofrontend.com/*", zone_name = "pictofrontend.com" }
]

[vars]
DOMAIN = "pictofrontend.com"
ORIGIN_FRONTEND = "https://pictofrontend.vercel.app"
ORIGIN_API = "https://pictofrontend.vercel.app"
